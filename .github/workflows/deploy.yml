name: Deploy to GitHub Pages

on:
  # Deploy on every push to main
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Rebuild daily to refresh Finnomena data (data is baked in at build time).
  # 01:00 UTC = 08:00 Asia/Bangkok. Adjust or remove as you like.
  schedule:
    - cron: "0 1 * * *"

# Force any not-yet-updated JS actions (e.g. upload-pages-artifact) onto Node 24
# so they don't emit the Node 20 deprecation warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Permissions required by actions/deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # IMPORTANT: must equal "/<your-repo-name>" for a project page
      # (https://<user>.github.io/<repo>). Change if your repo isn't "fund-watch".
      NEXT_PUBLIC_BASE_PATH: /fund-watch
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Disable Jekyll (serve _next/* as-is)
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
