<!DOCTYPE html>
<html lang="th">
  <head>

    <title>ออฟไลน์ — Fund Watch</title>
    <style>
      body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;

  </head>
  <body>
    <div class="box">
      <div class="dot">📈</div>
      <h1>คุณกำลังออฟไลน์</h1>
      <p>ไม่สามารถโหลดข้อมูลล่าสุดได้ในขณะนี้ ลองเชื่อมต่ออินเทอร์เน็ตอีกครั้ง แล้วรีเฟรชหน้านี้</p>
    </div>
  </body>
</html>
